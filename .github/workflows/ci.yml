name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

  peer-integration:
    name: test-${{ matrix.peer_preset }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        peer_preset:
          - lower
          - higher

    services:
      postgres:
        image: postgres:15.18
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: spence_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d spence_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: pnpm

      - name: Configure peer preset
        run: node scripts/configure-peer-matrix.js "${{ matrix.peer_preset }}"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare test schema
        run: pnpm db:prepare:test

      - name: Test
        run: |
          mkdir -p reports/junit
          pnpm test:ci --watchman=false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.peer_preset }}
          path: reports/coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: reports/coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload junit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.peer_preset }}
          path: reports/junit

  knex-compat:
    name: knex-compat-${{ matrix.knex_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        knex_version:
          - 2.4.0
          - 2.5.1
          - 3.0.1
          - 3.2.9

    services:
      postgres:
        image: postgres:15.18
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: spence_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d spence_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: pnpm

      - name: Configure knex version
        run: node scripts/configure-knex-version.js "${{ matrix.knex_version }}"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare test schema
        run: pnpm db:prepare:test

      - name: Run knex compatibility tests
        run: pnpm test:knex-compat --watchman=false

  mongodb-compat:
    name: mongodb-compat-${{ matrix.mongodb_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mongodb_version:
          - 6.0.0
          - 6.21.0
          - 7.0.0
          - 7.2.0

    services:
      postgres:
        image: postgres:15.18
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: spence_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d spence_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: pnpm

      - name: Configure mongodb version
        run: node scripts/configure-mongodb-version.js "${{ matrix.mongodb_version }}"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run mongodb compatibility tests
        run: pnpm test:mongo-compat --watchman=false
